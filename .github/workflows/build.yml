name: Build BattleToken2

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Build with Maven
        run: mvn clean package -B --no-transfer-progress

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BattleTokens-${{ github.run_number }}
          path: target/BattleTokens-*.jar
          if-no-files-found: error

      - name: ✅ Build Success
        run: echo "BattleToken2 berhasil di-build!"
